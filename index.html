<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream11 AI GOD MODE (60 Teams)</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{font-family:Arial;background:#0b0b0b;color:#fff;padding:15px}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none}
button{padding:12px;width:100%;margin-top:10px;background:#00e5ff;color:black;border:none;border-radius:6px}
.team{background:#1e1e1e;margin-top:10px;padding:10px;border-radius:8px}
.row{display:flex;gap:10px}
.row > *{flex:1}
label{font-size:12px;color:#aaa}
table{width:100%;margin-top:15px;border-collapse:collapse}
td,th{border:1px solid #555;padding:6px;font-size:12px}
</style>
</head>
<body>

<h2>🤖 Dream11 AI GOD MODE (60 Teams)</h2>
<p>Now with Exposure Tracking + Pair Rotation AI</p>

<input type="file" accept="image/*" onchange="handleOCR(event)">
<button onclick="fillDetectedPlayers()">⚡ Auto Fill Players</button>

<div class="row">
  <input id="exp" type="number" value="70" placeholder="Exposure %">
  <select id="toss">
    <option value="none">Toss</option>
    <option value="bat">Bat</option>
    <option value="bowl">Bowl</option>
  </select>
</div>

<div id="inputs"></div>

<button onclick="generateTeams()">🚀 Generate 60 Teams</button>

<div id="teams"></div>
<div id="exposure"></div>

<script>
let detectedPlayers=[];
let pairCount={}; // 🔥 pair tracking

function cleanText(line){
 return line.replace(/[^a-zA-Z .]/g,"").trim();
}

function detectRole(name){
 let n=name.toLowerCase();
 if(n.includes("wk")||n.includes("keeper")) return "wk";
 if(n.includes("bowl")) return "bowl";
 if(n.includes("all")) return "ar";
 return "bat";
}

async function handleOCR(e){
 const file=e.target.files[0];
 const { data:{text} } = await Tesseract.recognize(file,'eng');
 let lines=text.split("\n");
 detectedPlayers = lines.map(x=>({name:cleanText(x),role:detectRole(x)}));
}

function fillDetectedPlayers(){
 let unique=[...new Map(detectedPlayers.map(p=>[p.name,p])).values()].slice(0,24);
 for(let i=0;i<unique.length;i++){
  document.getElementById("p"+i).value=unique[i].name;
  document.getElementById("r"+i).value=unique[i].role;
 }
}

for(let i=0;i<24;i++){
 document.getElementById("inputs").innerHTML+=
 `<input id="p${i}" placeholder="Player ${i+1}">
  <select id="r${i}">
    <option value="bat">BAT</option>
    <option value="bowl">BOWL</option>
    <option value="ar">AR</option>
    <option value="wk">WK</option>
  </select>`;
}

function buildPlayers(){
 let arr=[];
 for(let i=0;i<24;i++){
  let name=document.getElementById("p"+i).value;
  let role=document.getElementById("r"+i).value;
  if(!name) return null;
  arr.push({name,role,count:0});
 }
 return arr;
}

function getPairKey(a,b){
 return [a,b].sort().join("-");
}

function generateTeams(){
 let players=buildPlayers();
 if(!players){alert("Fill all players");return;}

 pairCount={};

 let totalTeams = 60;
 let avgExposure = Math.floor((11 * totalTeams) / players.length); // equal distribution target

 // captain/VC counters
 players.forEach(p=>{
   p.cCount = 0;
   p.vcCount = 0;
 });

 let html="";

 for(let t=0;t<totalTeams;t++){

  let sorted = players.map(p=>{
    let base=Math.random()*100;

    // 🔥 balance exposure (push low-used players up)
    base += (avgExposure - p.count) * 5;

    return {...p,score:base};
  }).sort((a,b)=>b.score-a.score);

  let team=[];

  for(let p of sorted){
    if(team.length>=11) break;

    // 🔥 pair uniqueness check
    let valid=true;
    for(let existing of team){
      let key=getPairKey(p.name,existing.name);
      if((pairCount[key]||0)>3){
        valid=false;
        break;
      }
    }

    if(!valid) continue;

    team.push(p);
    p.count++;

    // update pair counts
    for(let other of team){
      if(other.name!==p.name){
        let key=getPairKey(p.name,other.name);
        pairCount[key]=(pairCount[key]||0)+1;
      }
    }
  }

  // 🔥 balanced captain selection (least used gets priority)
  let captain = [...team].sort((a,b)=>a.cCount-b.cCount)[0];
  captain.cCount++;

  // 🔥 balanced vice captain
  let vc = team
    .filter(p=>p.name!==captain.name)
    .sort((a,b)=>a.vcCount-b.vcCount)[0];
  vc.vcCount++;

  let names=team.map(p=>p.name);

  html+=`<div class="team">
  <b>Team ${t+1}</b><br>
  ${names.join(", ")}<br>
  ⭐ C: ${captain.name} | VC: ${vc.name}
  </div>`;
 }

 document.getElementById("teams").innerHTML=html;

 // 🔥 exposure table
 let expHtml="<h3>📊 Player Exposure</h3><table><tr><th>Player</th><th>Teams</th><th>C</th><th>VC</th></tr>";
 players.forEach(p=>{
  expHtml+=`<tr><td>${p.name}</td><td>${p.count}</td><td>${p.cCount}</td><td>${p.vcCount}</td></tr>`;
 });
 expHtml+="</table>";

 document.getElementById("exposure").innerHTML=expHtml;
}
</script>

</body>
</html>
